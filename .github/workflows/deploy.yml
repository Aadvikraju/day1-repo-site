name: Build Test Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm test || echo "No tests defined yet"
      
      - name: Build step
        run: echo "Static site - no build needed"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/day1-repo-site:latest
      
      - name: Deploy to EC2 with zero downtime
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull new image
            docker pull rajuraichalwar/day1-repo-site:latest
            
            # Run new container on port 8080 for testing
            docker stop myapp-new || true
            docker rm myapp-new || true
            docker run -d --name myapp-new -p 8080:80 rajuraichalwar/day1-repo-site:latest
            
            # Wait 10 sec for container to start
            sleep 10
            
            # Health check: if fail, remove new container and exit
            curl -f http://localhost:8080 || (docker rm -f myapp-new && echo "Health check failed, rollback" && exit 1)
            
            # If health check pass, switch traffic
            docker stop myapp || true
            docker rm myapp || true
            docker rename myapp-new myapp
            
            # Show logs for verification
            docker logs myapp --tail 20
